name = "count_union_family_powersets_proof"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["CountUnionFamilyPowersetsProof"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.1"

[[require]]
name = "verso"
git = "https://github.com/leanprover/verso"
rev = "v4.29.0"

[[lean_lib]]
name = "CountUnionFamilyPowersetsProof"

[[lean_lib]]
name = "Doc"

[[lean_exe]]
name = "generate-docs"
root = "DocMain"
